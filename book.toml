[book]
title = "Iron Curtain — Design Documentation"
description = "Design docs for a Rust-native Red Alert RTS engine"
authors = ["David Krasnitsky"]
language = "en"

[build]
build-dir = "docs"

[output.html]
theme = "src/theme"
git-repository-url = "https://github.com/iron-curtain-engine/iron-curtain-design-docs"
edit-url-template = "https://github.com/iron-curtain-engine/iron-curtain-design-docs/edit/main/{path}"
default-theme = "navy"
additional-css = ["css/sidebar-logo.css"]

[output.html.fold]
enable = true
level = 0

